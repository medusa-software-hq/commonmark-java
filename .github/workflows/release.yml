name: release

on:
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout sources
        uses: actions/checkout@v4

      - name: Set up JDK and Maven credentials
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: zulu
          server-id: cloudsmith
          server-username: CLOUDSMITH_USERNAME
          server-password: CLOUDSMITH_API_KEY

      - name: Deploy to Cloudsmith
        run: mvn -B -Prelease deploy
        env:
          CLOUDSMITH_USERNAME: ${{ secrets.CLOUDSMITH_USERNAME }}
          CLOUDSMITH_API_KEY: ${{ secrets.CLOUDSMITH_API_KEY }}
